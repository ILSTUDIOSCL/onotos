<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONOTO'S — Carta Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E50914;
    --red-dark: #b0070f;
    --yellow: #FFC300;
    --yellow-dark: #cc9c00;
    --black: #0D0D0D;
    --black2: #1a1a1a;
    --black3: #222;
    --white: #FFFFFF;
    --gray: #888;
    --card-bg: #181818;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--black);
    border-bottom: 3px solid var(--red);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 1.5rem;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--white);
    letter-spacing: 4px;
    line-height: 1;
  }
  .logo span { color: var(--red); }
  .logo small {
    display: block;
    font-family: 'Barlow', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--yellow);
    text-transform: uppercase;
    margin-top: -4px;
  }

  .cart-btn {
    background: var(--yellow);
    color: var(--black);
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, transform 0.15s;
    position: relative;
  }
  .cart-btn:hover { background: var(--yellow-dark); transform: scale(1.04); }
  .cart-count {
    background: var(--red);
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 0.75rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }
  .cart-count.show { display: flex; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--red) 0%, #8b0000 100%);
    text-align: center;
    padding: 2.5rem 1.5rem 2.5rem;
  }
  .logo-fixed {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 0 auto 1.5rem;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 30px rgba(229,9,20,0.5);
  }
  .logo-fixed img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    letter-spacing: 6px;
    line-height: 0.9;
    color: var(--white);
  }
  .hero p {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
    margin-top: 0.8rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* NAV TABS */
  .nav-wrap {
    background: var(--black2);
    border-bottom: 1px solid #2a2a2a;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 72px;
    z-index: 90;
  }
  .nav-wrap::-webkit-scrollbar { display: none; }
  .nav-tabs {
    display: flex;
    gap: 0;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
    min-width: max-content;
  }
  .nav-tab {
    background: none;
    border: none;
    color: var(--gray);
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1rem 1.2rem;
    cursor: pointer;
    transition: color 0.2s;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .nav-tab:hover { color: var(--white); }
  .nav-tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem 6rem;
  }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 1.5rem;
    border-left: 5px solid var(--red);
    padding-left: 1rem;
  }

  /* CARDS GRID */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1.2rem;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
    transition: transform 0.25s, border-color 0.25s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: var(--red);
  }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: #2a2a2a;
    display: block;
    transition: transform 0.35s;
  }
  .card:hover .card-img { transform: scale(1.07); }
  .card-img-wrap { overflow: hidden; position: relative; }
  .card-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--red);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 50px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .card-body {
    padding: 1rem 1.1rem 1.1rem;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .card-name {
    font-family: 'Barlow', sans-serif;
    font-weight: 900;
    font-size: 1.05rem;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }
  .card-desc {
    font-size: 0.8rem;
    color: var(--gray);
    line-height: 1.5;
    flex: 1;
    margin-bottom: 0.8rem;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--yellow);
    letter-spacing: 1px;
  }
  .add-btn {
    background: var(--yellow);
    color: var(--black);
    border: none;
    border-radius: 50px;
    padding: 7px 16px;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--yellow-dark); transform: scale(1.06); }
  .add-btn:active { transform: scale(0.97); }

  /* CART PANEL */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
  }
  .cart-overlay.open { display: block; }
  .cart-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(420px, 100vw);
    background: var(--black2);
    border-left: 2px solid var(--red);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .cart-panel.open { transform: translateX(0); }
  .cart-header {
    background: var(--red);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: #fff;
  }
  .close-cart {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.6rem;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }
  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .cart-empty {
    text-align: center;
    color: var(--gray);
    padding: 3rem 1rem;
    font-size: 1rem;
  }
  .cart-item {
    background: var(--black3);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    border: 1px solid #2a2a2a;
  }
  .ci-info { flex: 1; }
  .ci-name { font-weight: 700; font-size: 0.9rem; color: var(--white); }
  .ci-price { font-size: 0.8rem; color: var(--yellow); font-weight: 600; }
  .ci-qty {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-btn {
    background: #333;
    border: none;
    color: #fff;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--red); }
  .qty-num { font-weight: 700; min-width: 16px; text-align: center; }
  .cart-footer {
    padding: 1.2rem 1.5rem;
    border-top: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .cart-total span:last-child { color: var(--yellow); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
  .whatsapp-btn {
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .whatsapp-btn:hover { background: #1ebe5d; transform: scale(1.03); }
  .clear-btn {
    background: none;
    border: 1px solid #333;
    color: var(--gray);
    border-radius: 50px;
    padding: 10px;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--red);
    color: #fff;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.9rem;
    z-index: 300;
    transition: transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .header-inner { height: 60px; }
    .logo { font-size: 2rem; }
    .hero { padding: 2rem 1rem 1.5rem; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.9rem; }
  }
</style>
</head>

      { id:31, name:"Latas Especiales", price:2000, desc:"Bebida en lata especial", img:"https://via.placeholder.com/300x200/222222/ffffff?text=Bebidas" },
      { id:32, name:"Bebida 1.5L", price:3000, desc:"Botella familiar 1.5 litros", img:"https://via.placeholder.com/300x200/222222/ffffff?text=Bebida" },
    ]
  },
];

let cart = {};
let activeSection = "perros";

function fmt(n) { return "$" + n.toLocaleString("es-CL"); }

function buildNav() {
  const nav = document.getElementById("navTabs");
  MENU.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "nav-tab" + (cat.id === activeSection ? " active" : "");
    btn.textContent = cat.label;
    btn.onclick = () => showSection(cat.id);
    nav.appendChild(btn);
  });
}

function buildSections() {
  const main = document.getElementById("main");
  MENU.forEach(cat => {
    const sec = document.createElement("div");
    sec.className = "section" + (cat.id === activeSection ? " active" : "");
    sec.id = "sec-" + cat.id;

    let html = `<h2 class="section-title">${cat.label}</h2><div class="cards">`;
    cat.items.forEach(item => {
      html += `
        <div class="card">
          <div class="card-img-wrap">
            <img class="card-img" src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/1a1a1a/555?text=ONOTO%27S'">
            <span class="card-badge">${cat.label.split(" ")[1] || cat.label}</span>
          </div>
          <div class="card-body">
            <div class="card-name">${item.name}</div>
            ${item.desc ? `<div class="card-desc">${item.desc}</div>` : '<div class="card-desc" style="flex:1"></div>'}
            <div class="card-footer">
              <span class="card-price">${fmt(item.price)}</span>
              <button class="add-btn" onclick="addToCart(${item.id})">+ Agregar</button>
            </div>
          </div>
        </div>`;
    });
    html += "</div>";
    sec.innerHTML = html;
    main.appendChild(sec);
  });
}

function showSection(id) {
  activeSection = id;
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  document.getElementById("sec-" + id).classList.add("active");
  const tabs = document.querySelectorAll(".nav-tab");
  MENU.forEach((cat, i) => { if(cat.id === id) tabs[i].classList.add("active"); });
}

function addToCart(itemId) {
  const item = MENU.flatMap(c => c.items).find(i => i.id === itemId);
  if(!item) return;
  if(cart[itemId]) cart[itemId].qty++;
  else cart[itemId] = { ...item, qty: 1 };
  updateCart();
  showToast("¡" + item.name + " agregado! 🔥");
}

function removeFromCart(itemId) {
  if(!cart[itemId]) return;
  cart[itemId].qty--;
  if(cart[itemId].qty <= 0) delete cart[itemId];
  updateCart();
}

function clearCart() {
  cart = {};
  updateCart();
}

function updateCart() {
  const keys = Object.keys(cart);
  const count = keys.reduce((a, k) => a + cart[k].qty, 0);
  const total = keys.reduce((a, k) => a + cart[k].price * cart[k].qty, 0);

  const countEl = document.getElementById("cartCount");
  countEl.textContent = count;
  countEl.classList.toggle("show", count > 0);
  document.getElementById("cartTotal").textContent = fmt(total);

  const itemsEl = document.getElementById("cartItems");
  if(keys.length === 0) {
    itemsEl.innerHTML = '<div class="cart-empty">Tu carrito está vacío 🛒</div>';
    return;
  }
  itemsEl.innerHTML = keys.map(k => {
    const it = cart[k];
    return `
      <div class="cart-item">
        <div class="ci-info">
          <div class="ci-name">${it.name}</div>
          <div class="ci-price">${fmt(it.price)} c/u</div>
        </div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="removeFromCart(${it.id})">−</button>
          <span class="qty-num">${it.qty}</span>
          <button class="qty-btn" onclick="addToCart(${it.id})">+</button>
        </div>
      </div>`;
  }).join("");

  const msg = buildWhatsAppMsg(total);
  document.getElementById("whatsappBtn").href = "https://wa.me/56912345678?text=" + encodeURIComponent(msg);
}

function buildWhatsAppMsg(total) {
  let msg = "🍔 *Pedido ONOTO'S*\n\n";
  Object.values(cart).forEach(it => {
    msg += `• ${it.qty}x ${it.name} — ${fmt(it.price * it.qty)}\n`;
  });
  msg += `\n*Total: ${fmt(total)}*`;
  return msg;
}

function toggleCart() {
  const overlay = document.getElementById("cartOverlay");
  const panel = document.getElementById("cartPanel");
  overlay.classList.toggle("open");
  panel.classList.toggle("open");
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

buildNav();
buildSections();
</script>
</body>
</html>
